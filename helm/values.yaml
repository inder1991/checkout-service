replicaCount = 2

image = {
    "repository": "your-registry/checkout-service",
    "pullPolicy": "IfNotPresent",
    "tag": "2.1.1"
}

service = {
    "type": "ClusterIP",
    "port": 8000
}

env = {
    "INVENTORY_SERVICE_URL": "http://inventory-service:8002",
    "PAYMENT_SERVICE_URL": "http://payment-service:8003",
    "NOTIFICATION_SERVICE_URL": "http://notification-service:8004",
    "USER_SERVICE_URL": "http://user-service:8001",
    "CHECKOUT_TOTAL_TIMEOUT": "20",
    "INVENTORY_TIMEOUT": "12",
    "INVENTORY_MAX_RETRIES": "3",
    "INVENTORY_RETRY_BACKOFF_BASE": "1.0",
    "PAYMENT_TIMEOUT": "8"
}

resources = {
    "limits": {
        "cpu": "1000m",
        "memory": "1Gi"
    },
    "requests": {
        "cpu": "200m",
        "memory": "256Mi"
    }
}

autoscaling = {
    "enabled": True,
    "minReplicas": 2,
    "maxReplicas": 10,
    "targetCPUUtilizationPercentage": 70
}