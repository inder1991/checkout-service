replicaCount: 2

image:
  repository: your-registry/checkout-service
  pullPolicy: IfNotPresent
  tag: "2.2.0"

service:
  type: ClusterIP
  port: 8000

env:
  INVENTORY_SERVICE_URL: "http://inventory-service:8002"
  PAYMENT_SERVICE_URL: "http://payment-service:8003"
  NOTIFICATION_SERVICE_URL: "http://notification-service:8004"
  USER_SERVICE_URL: "http://user-service:8001"
  CHECKOUT_TOTAL_TIMEOUT: "15"
  # Inventory: separate connect timeout (fast-fail) from read timeout
  INVENTORY_TIMEOUT: "8"
  INVENTORY_CONNECT_TIMEOUT: "2"
  INVENTORY_MAX_RETRIES: "3"
  INVENTORY_RETRY_BACKOFF_BASE: "0.5"
  # Payment
  PAYMENT_TIMEOUT: "8"
  PAYMENT_CONNECT_TIMEOUT: "2"
  # Notification
  NOTIFICATION_TIMEOUT: "3"
  NOTIFICATION_CONNECT_TIMEOUT: "2"
  NOTIFICATION_MAX_RETRIES: "3"
  # User
  USER_TIMEOUT: "3"
  USER_CONNECT_TIMEOUT: "2"
  # Circuit breaker for inventory-service
  CIRCUIT_BREAKER_FAILURE_THRESHOLD: "5"
  CIRCUIT_BREAKER_RECOVERY_TIMEOUT: "30"
  # Transport-level retries for transient TCP failures
  TRANSPORT_RETRIES: "2"

resources:
  limits:
    cpu: "1000m"
    memory: "1Gi"
  requests:
    cpu: "200m"
    memory: "256Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70